name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --noconsole --add-data "templates;templates" --add-data "static;static" --icon "icon.ico" --name leakapp app.py
        python -c "import os; exe_files = [f for f in os.listdir('dist') if f.endswith('.exe')]; print('Found:', exe_files); [os.rename(f'dist/{f}', 'dist/漏检趋势追溯系统.exe') for f in exe_files]"
        dir dist\*.exe
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 漏检趋势追溯系统
        path: dist/漏检趋势追溯系统.exe
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/漏检趋势追溯系统.exe
        tag_name: v1.0.8
        name: 漏检趋势追溯系统 v1.0.8
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
